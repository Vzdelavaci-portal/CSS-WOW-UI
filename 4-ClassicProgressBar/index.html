<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classic Progress Bar</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <span class="badge">CSS WOW UI #4</span>

    <h1>Classic Progress Bar</h1>

    <p>
        A clean and modern animated progress bar
        built with HTML, CSS and JavaScript.
    </p>

    <div class="progress">

        <div class="progress-fill">
            <span id="percent">0%</span>
        </div>

    </div>

    <div class="buttons">
        <button id="start">Start</button>
        <button id="reset">Reset</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
