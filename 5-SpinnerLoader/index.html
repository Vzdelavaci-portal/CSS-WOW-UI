<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Spinner Loader</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <span class="badge">CSS WOW UI #5</span>

    <h1>Spinner Loaders</h1>

    <p>
      A collection of modern CSS loading spinners built with pure HTML and CSS.
    </p>

    <section class="grid">

      <div class="loader-card">
        <div class="spinner classic"></div>
        <h3>Classic</h3>
      </div>

      <div class="loader-card">
        <div class="spinner gradient"></div>
        <h3>Gradient</h3>
      </div>

      <div class="loader-card">
        <div class="spinner neon"></div>
        <h3>Neon</h3>
      </div>

      <div class="loader-card">
        <div class="spinner dual"></div>
        <h3>Dual Ring</h3>
      </div>

      <div class="loader-card">
        <div class="spinner glass"></div>
        <h3>Glass</h3>
      </div>

      <div class="loader-card">
        <div class="dots-loader">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h3>Dotted</h3>
      </div>

    </section>
  </main>
</body>
</html>
