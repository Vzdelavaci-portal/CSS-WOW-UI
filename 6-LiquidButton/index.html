<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Liquid Button</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <span class="badge">CSS WOW UI #6</span>

    <h1>Liquid Button</h1>

    <p>
      A modern button with animated liquid waves,
      glowing colors and smooth hover interactions.
    </p>

    <section class="buttons">

      <button class="liquid-btn ocean">
        <span>Ocean</span>
        <div class="liquid"></div>
        <div class="bubbles">
          <i></i><i></i><i></i><i></i>
        </div>
      </button>

      <button class="liquid-btn purple">
        <span>Purple</span>
        <div class="liquid"></div>
        <div class="bubbles">
          <i></i><i></i><i></i><i></i>
        </div>
      </button>

      <button class="liquid-btn pink">
        <span>Pink</span>
        <div class="liquid"></div>
        <div class="bubbles">
          <i></i><i></i><i></i><i></i>
        </div>
      </button>

      <button class="liquid-btn green">
        <span>Green</span>
        <div class="liquid"></div>
        <div class="bubbles">
          <i></i><i></i><i></i><i></i>
        </div>
      </button>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
