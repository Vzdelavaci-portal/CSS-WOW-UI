<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>3D Press Button</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <span class="badge">CSS WOW UI #10</span>

    <h1>3D Press Button</h1>

    <p class="intro">
      Realistic buttons with depth, shadows,
      ripple effects and satisfying press animations.
    </p>

    <section class="buttons">

      <button class="press-button cyan" type="button">
        <span class="button-face">
          <span class="button-icon">🚀</span>
          <span>Launch</span>
        </span>
      </button>

      <button class="press-button purple" type="button">
        <span class="button-face">
          <span class="button-icon">⬇️</span>
          <span>Download</span>
        </span>
      </button>

      <button class="press-button pink" type="button">
        <span class="button-face">
          <span class="button-icon">🛒</span>
          <span>Purchase</span>
        </span>
      </button>

      <button class="press-button green" type="button">
        <span class="button-face">
          <span class="button-icon">✓</span>
          <span>Confirm</span>
        </span>
      </button>

    </section>

    <p class="hint">Press the buttons to feel the depth.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
